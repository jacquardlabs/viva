name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Tests are stdlib-only and self-running via each file's main().
      # Run every file as a script — pytest alone misses the files that
      # define only main() (e.g. test_revision_history.py).
      - name: Run tests
        run: |
          for f in tests/test_*.py; do
            echo "=== $f ==="
            python "$f"
          done
